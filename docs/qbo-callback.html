<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NGL Accounting — Completing QuickBooks connection…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           background: #f8fafc; color: #334155; display: flex; align-items: center;
           justify-content: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 40px 48px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); text-align: center; max-width: 460px; }
    h1 { color: #ea580c; font-size: 20px; margin: 0 0 12px; }
    p { margin: 8px 0; font-size: 14px; line-height: 1.5; }
    .spinner { border: 3px solid #fed7aa; border-top-color: #ea580c; border-radius: 50%;
               width: 36px; height: 36px; animation: spin 0.8s linear infinite;
               margin: 16px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hint { color: #64748b; font-size: 12px; margin-top: 20px; }
    .err  { color: #dc2626; display: none; }
    a { color: #ea580c; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spin"></div>
    <h1>Completing QuickBooks Connection…</h1>
    <p id="msg">Redirecting back to NGL Accounting on your computer.</p>
    <p class="err" id="err">
      Couldn't reach NGL Accounting on this computer. Make sure the app is running,
      then <a href="#" onclick="window.location.reload();return false;">try again</a>.
    </p>
    <p class="hint">You can close this tab once the app shows "Connected".</p>
  </div>

  <script>
    (function () {
      var qs = window.location.search || '';
      var target = 'http://localhost:8787/qbo/oauth/callback' + qs;
      // Give the browser a tick to paint the UI, then redirect.
      setTimeout(function () { window.location.replace(target); }, 300);
      // If still here after 6s, the local app likely isn't running.
      setTimeout(function () {
        document.getElementById('spin').style.display = 'none';
        document.getElementById('msg').style.display = 'none';
        document.getElementById('err').style.display = 'block';
      }, 6000);
    })();
  </script>
</body>
</html>
